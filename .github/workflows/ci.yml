name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions: {}

jobs:
  pr-title:
    name: PR Title
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6 # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6 # v6

      - name: Setup Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Lint and Formatting
        run: pnpm lint

      - name: Check Types
        run: pnpm check

      - name: Build Action
        run: pnpm build

      - name: Run Tests
        run: pnpm test
